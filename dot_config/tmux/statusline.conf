# vim: ft=tmux
# Catppuccin Mocha

set -g mode-style "fg=#1e1e2e,bg=#cba6f7"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#cdd6f4,bg=#1e1e2e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

# Left:  session name
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#1e1e2e,nobold] "

# Right: time + user
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#bac2de,bg=#45475a]  %H:%M #[fg=#cba6f7,bg=#45475a,nobold]#[fg=#1e1e2e,bg=#cba6f7,bold]  #(whoami) "

setw -g window-status-activity-style "underscore,fg=#bac2de,bg=#1e1e2e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#6c7086,bg=#1e1e2e"
setw -g window-status-format " #I  #{b:pane_current_path} "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa] #[fg=#1e1e2e,bg=#89b4fa,bold] #I  #{b:pane_current_path} #[fg=#89b4fa,bg=#1e1e2e,nobold]"
