# vim: ft=tmux
# Grayscale — matches Starship prompt (bg:252 / fg:235 palette)

set -g mode-style "fg=#eeeeee,bg=#262626"

set -g message-style "fg=#eeeeee,bg=#262626"
set -g message-command-style "fg=#eeeeee,bg=#262626"

set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=#d0d0d0"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#d0d0d0,bg=#1c1c1c"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

# Left: [session:window.pane] [whoami] — mirrors starship username+directory blocks
set -g status-left "#[fg=#262626,bg=#d0d0d0,bold] #S:#I.#P #[fg=#d0d0d0,bg=#8a8a8a,nobold,nounderscore,noitalics]#[fg=#262626,bg=#8a8a8a,bold] #(whoami) #[fg=#8a8a8a,bg=#1c1c1c]"

# Right: [time] [hostname] — mirrors starship cmd_duration block style
set -g status-right "#[fg=#3a3a3a,bg=#1c1c1c]#[fg=#8a8a8a,bg=#3a3a3a] %H:%M #[fg=#d0d0d0,bg=#3a3a3a,nobold,nounderscore,noitalics]#[fg=#262626,bg=#d0d0d0,bold] #h "

setw -g window-status-activity-style "underscore,fg=#8a8a8a,bg=#1c1c1c"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#8a8a8a,bg=#1c1c1c"
setw -g window-status-format "#[fg=#1c1c1c,bg=#1c1c1c]#[default] #I  #{b:pane_current_path} #[fg=#1c1c1c,bg=#1c1c1c,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1c1c1c,bg=#d0d0d0]#[fg=#262626,bg=#d0d0d0,bold] #I #[fg=#d0d0d0,bg=#8a8a8a] #{b:pane_current_path} #[fg=#8a8a8a,bg=#1c1c1c,nobold]"
