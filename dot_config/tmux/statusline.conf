# vim: ft=tmux
# Flat dark — matches WezTerm tab bar (#0f0f0f base, no powerline arrows)

set -g mode-style "fg=#d0d0d0,bg=#242424"
set -g message-style "fg=#d0d0d0,bg=#141414"
set -g message-command-style "fg=#d0d0d0,bg=#141414"

set -g pane-border-style "fg=#242424"
set -g pane-active-border-style "fg=#484848"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"
set -g status-style "fg=#484848,bg=#0f0f0f"

set -g status-left-length "100"
set -g status-right-length "60"
set -g status-left-style NONE
set -g status-right-style NONE

# Left: empty — window tabs carry all context
set -g status-left ""

# Right: session  │  date  │  time — flat, no arrows
set -g status-right "#[fg=#333333,bg=#0f0f0f] #S #[fg=#2a2a2a]│#[fg=#333333] %a %d/%m #[fg=#2a2a2a]│#[fg=#606060,bold] %H:%M "

# Window tabs: flat, matching WezTerm aesthetic
setw -g window-status-separator ""
setw -g window-status-activity-style "underscore,fg=#484848,bg=#0f0f0f"
setw -g window-status-style "NONE,fg=#484848,bg=#141414"
setw -g window-status-format " #I  #{b:pane_current_path} "
setw -g window-status-current-style "NONE,fg=#d0d0d0,bg=#242424,bold"
setw -g window-status-current-format " #I  #{b:pane_current_path} "
