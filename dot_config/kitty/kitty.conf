# Color override: Catppuccin Mocha (matches Alacritty)
background            #0f0f0f
background_opacity    0.92
foreground            #cdd6f4

cursor                #f5e0dc
cursor_text_color     #1e1e2e

selection_background  #89b4fa
selection_foreground  #1e1e2e

# Normal colors
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #94e2d5
color7  #bac2de

# Bright colors
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #a6adc8

# Reset extended colors to xterm-256 grayscale
# These are used by starship prompt — without override they render pink in kitty
color232 #080808
color233 #121212
color234 #1c1c1c
color235 #262626
color236 #303030
color237 #3a3a3a
color238 #444444
color239 #4e4e4e
color244 #808080
color245 #8a8a8a
color248 #a8a8a8
color249 #b2b2b2
color250 #bcbcbc
color251 #c6c6c6
color252 #d0d0d0
color253 #dadada
color254 #e4e4e4
color255 #eeeeee

# Font
font_family      JetBrains Mono Nerd Font
font_size 11.0

# Cursor
cursor_shape beam
cursor_trail 1

# Padding (why weird value? consistency with foot)
window_margin_width 21.75

# No stupid close confirmation
confirm_os_window_close 0

# Use zsh shell
shell zsh

# Copy selected text to clipboard automatically
copy_on_select yes

# Copy
map ctrl+c    copy_or_interrupt

# Search
map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0
