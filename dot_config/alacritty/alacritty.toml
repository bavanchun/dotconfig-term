import = ["~/.config/alacritty/theme.toml"]

# ── Font ──────────────────────────────────────────────────────
[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

# ── Window ────────────────────────────────────────────────────
[window]
opacity        = 0.95
padding.x      = 10
padding.y      = 8
decorations    = "None"
dynamic_title  = true

# ── Cursor ────────────────────────────────────────────────────
[cursor]
style.shape    = "Beam"
style.blinking = "On"
blink_interval = 500

# ── Scrollback ────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ── Keyboard ──────────────────────────────────────────────────
[keyboard]
bindings = [
    # Paste bằng Ctrl+V
    { key = "V", mods = "Control", action = "Paste" },
    # Tab mới (dùng với tmux/zellij)
    { key = "T", mods = "Control|Shift", action = "CreateNewWindow" },
]

