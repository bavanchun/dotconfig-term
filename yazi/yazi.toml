[mgr]
show_hidden = false
sort_by = "natural"
sort_dir_first = true
linemode = "none"

[preview]
max_width = 1000
max_height = 1000
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true },
]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/toml", use = "edit" },
  { mime = "application/yaml", use = "edit" },
]

[plugin]
prepend_fetchers = [
  { id = "git", name = "*", run = "git" },
  { id = "git", name = "*/", run = "git" },
]
